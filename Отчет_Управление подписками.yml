    - columns:
        - mode: DIVIDER
          width:
            mode: FRACTION
            value: 1
          height:
            mode: FIXED
            value: 100
    - columns:
        - mode: TABS
          tabs:
            - label: Вторичные включения типовых подписок
              innerLayout:
                rows:
                  - columns:
                      - mode: WIDGET
                        widgetKey: text (1)
                        width:
                          mode: FRACTION
                          value: 1
                        height:
                          mode: FIXED
                      - mode: WIDGET
                        widgetKey: button (7)
                        width:
                          mode: FIXED
                          value: 260
                        height:
                          mode: FIXED
                      - mode: WIDGET
                        widgetKey: button (16)
                        width:
                          mode: FIXED
                          value: 290
                        height:
                          mode: FIXED
                    alignment: right
                  - columns:
                      - mode: WIDGET
                        widgetKey: table (5)
                        width:
                          mode: FRACTION
                          value: 1
                        height:
                          mode: FIXED
              displayCondition:
                mode: FORMULA
                formula: >-
                  length( 
                    arraySymmetricDifference(
                      process(groupArrayIf("teams_notification_subscriptions"."event_type_name", "teams_notification_subscriptions"."email"=${currentEmployeeEmail})), 
                      process(groupArray("adaptive_cards_collection"."card_name_ru"))
                    )
                  ) AS symmetric_length != 0 


                  AND 


                  symmetric_length < length (groupArray("adaptive_cards_collection"."card_name_ru"))
            - label: Нет доступных уведомлений
              innerLayout:
                rows:
                  - columns:
                      - mode: WIDGET
                        widgetKey: text (1) (1)
                        width:
                          mode: FRACTION
                          value: 1
                        height:
                          mode: FIXED
                      - mode: WIDGET
                        widgetKey: button (7) (1)
                        width:
                          mode: FIXED
                          value: 260
                        height:
                          mode: FIXED
                    alignment: right
                  - columns:
                      - mode: WIDGET
                        widgetKey: table (5) (1)
                        width:
                          mode: FRACTION
                          value: 1
                        height:
                          mode: FIXED
              displayCondition:
                mode: FORMULA
                formula: >-
                  empty(
                    arraySymmetricDifference(
                      process(groupArrayIf("teams_notification_subscriptions"."event_type_name", "teams_notification_subscriptions"."email"=${currentEmployeeEmail})), 
                      process(groupArray("adaptive_cards_collection"."card_name_ru"))
                    )
                  )
            - label: Первичное включение
              innerLayout:
                rows:
                  - columns:
                      - mode: WIDGET
                        widgetKey: text (5)
                        width:
                          mode: FRACTION
                          value: 2
                        height:
                          mode: FIXED
                      - mode: WIDGET
                        widgetKey: button (17)
                        width:
                          mode: FIXED
                          value: 260
                        height:
                          mode: FIXED
              displayCondition:
                mode: FORMULA
                formula: has(process(groupArray("teams_notification_subscriptions"."email")),
                  ${currentEmployeeEmail}) = 0
          likeViewBackground: false
          textSize: 12
          width:
            mode: FRACTION
            value: 1
