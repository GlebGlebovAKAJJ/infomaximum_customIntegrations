        - mode: DIVIDER
          width:
            mode: FRACTION
            value: 1
          height:
            mode: FIXED
            value: 150
    - columns:
        - mode: WIDGET
          widgetKey: text
          width:
            mode: FRACTION
            value: 1
          height:
            mode: FIXED
    - columns:
        - mode: DIVIDER
          width:
            mode: FRACTION
            value: 1
          height:
            mode: FIXED
            value: 40
    - columns:
