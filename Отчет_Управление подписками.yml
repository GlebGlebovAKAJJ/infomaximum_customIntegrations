                  mode: BASE
                  value: "#078936"
              - value: Отключена
                color:
                  mode: BASE
                  value: "#96aabf"
        - type: DIMENSION
          name: Дата включения
          value:
            mode: FORMULA
            formula: addHours("teams_notification_subscriptions"."started_at", 3)
          dbDataType: Nullable(DateTime)
          hideEmptyValues: false
          format:
            value: DATETIME
            mode: BASE
          formatting:
            value: AUTO
            mode: BASE
          onClick: []
          displayCondition:
            mode: FORMULA
            formula: >-
              process(

              arrayExists(
                elem -> elem = 1, 
                  groupArrayIf(
                    "teams_notification_subscriptions"."is_active",
                    "teams_notification_subscriptions"."email"=${currentEmployeeEmail}
                    )
                  )
                )
          displayMode: NONE
          width:
            value: null
            mode: PIXEL
